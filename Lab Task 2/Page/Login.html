<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <link rel="stylesheet" href="A:\Web\Webtech LAB\MID Term\Lab Task 2\Design\Style.css">
    <script src="A:\Web\Webtech LAB\MID Term\Lab Task 2\JavaScript\Script.js"></script>
</head>
<body>
    <fieldset class="login-page">
        <div class="login-card">
            <header class="login-header">
                <h1 id="page-title">Student Login</h1>
                <p>Please enter your log-in information</p>
            </header>

            <form id="loginForm" onsubmit="return validateLogin()">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username">
                

                
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password">
                </div>

                <button type="submit" id="loginButton">Log In</button>
                <p id="message" class="message"></p>
            </form>
        </div>
    </fieldset>
</body>
</html>
